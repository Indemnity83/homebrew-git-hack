name: Update Release PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  update:
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}

      - name: Compute version and sha256
        id: info
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])")
          TAG="v${VERSION}"
          URL="https://github.com/indemnity83/homebrew-git-hack/releases/download/${TAG}/git-hack"
          SHA256=$(shasum -a 256 git-hack | cut -d' ' -f1)
          MANPAGE_SHA256=$(shasum -a 256 doc/git-hack.1 | cut -d' ' -f1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "manpage_sha256=$MANPAGE_SHA256" >> "$GITHUB_OUTPUT"

      - name: Update formula and README
        run: |
          URL="${{ steps.info.outputs.url }}"
          SHA256="${{ steps.info.outputs.sha256 }}"
          MANPAGE_SHA256="${{ steps.info.outputs.manpage_sha256 }}"
          TAG="${{ steps.info.outputs.tag }}"
          MANPAGE_URL="https://github.com/indemnity83/homebrew-git-hack/releases/download/${TAG}/git-hack.1"
          # Update script URL (ends in /git-hack", not /git-hack.1")
          sed -i 's|url "[^"]*releases/download/[^"]*git-hack"|url "'"${URL}"'"|' Formula/git-hack.rb
          # Update script sha256 (line immediately after the script URL line)
          sed -i '/releases\/download\/[^"]*git-hack"/{n; s|sha256 "[^"]*"|sha256 "'"${SHA256}"'"|}' Formula/git-hack.rb
          # Update manpage URL (ends in /git-hack.1")
          sed -i 's|url "[^"]*releases/download/[^"]*git-hack\.1"|url "'"${MANPAGE_URL}"'"|' Formula/git-hack.rb
          # Update manpage sha256 (line immediately after the manpage URL line)
          sed -i '/releases\/download\/[^"]*git-hack\.1"/{n; s|sha256 "[^"]*"|sha256 "'"${MANPAGE_SHA256}"'"|}' Formula/git-hack.rb
          sed -i "s|releases/download/v[^/]*/git-hack -o|releases/download/${TAG}/git-hack -o|" README.md
          sed -i "s|echo \".*  /tmp/git-hack\"|echo \"${SHA256}  /tmp/git-hack\"|" README.md

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/git-hack.rb README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update formula and install docs for ${{ steps.info.outputs.tag }}"
            git push origin ${{ github.head_ref }}
          fi
